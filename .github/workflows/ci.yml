name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
    - name: Check Formatting (Rust)
      run: cargo fmt --all -- --check
    - name: Clippy
      run: cargo clippy --workspace -- -D warnings
    - name: Build
      run: cargo build --workspace

  rust-tests:
    runs-on: ubuntu-latest
    needs: rust-checks
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Run tests with coverage
      run: cargo llvm-cov --workspace --lcov --output-path coverage.lcov
    - name: Upload coverage to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rust-coverage
        path: coverage.lcov

  ts-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install pnpm
      run: npm install -g pnpm
    - name: Install dependencies
      run: pnpm install
    - name: Run TypeScript tests with coverage
      run: pnpm --filter adler-asi test -- --coverage
    - name: Upload coverage to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ts-coverage
        path: apps/desktop/coverage/

  e2e-tests:
    runs-on: ubuntu-latest
    needs: ts-tests
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install pnpm
      run: npm install -g pnpm
    - name: Install dependencies
      run: pnpm install
    - name: Install Playwright browsers
      run: pnpm --filter adler-asi exec playwright install chromium
    - name: Run E2E tests
      run: pnpm --filter adler-asi test:e2e

  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install cargo-audit
      run: cargo install cargo-audit
    - name: Run security audit
      run: cargo audit --ignore RUSTSEC-2024-XXXX
    - name: Run pnpm audit
      run: pnpm audit --audit-level=high
